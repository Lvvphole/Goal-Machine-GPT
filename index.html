<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Modern mobile social UI: X/TikTok dark base + restrained Instagram warmth */
  --bg:#050507;
  --surface:#0a0d12;
  --card:#12161d;
  --card2:#181d26;
  --field:#0d1118;
  --field2:#10151d;

  --border:#242a35;
  --border2:#333b49;
  --borderFocus:#ff8a3d;

  --ink:#f4f6f8;
  --ink2:#d7dce3;
  --muted:#9aa3af;
  --dim:#717985;
  --dim2:#58606c;

  --accent:#ff7a2f;
  --accent2:#ff9f45;
  --accentSoft:rgba(255,122,47,.14);

  --green:#00c781;
  --red:#ff375f;
  --blue:#1d9bf0;

  --shadow:0 18px 45px rgba(0,0,0,.38);
  --shadowSoft:0 10px 30px rgba(255,122,47,.10);
}

html{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
}

body{
  min-height:100dvh;
  background:
    radial-gradient(circle at 20% -10%,rgba(255,122,47,.10),transparent 28%),
    radial-gradient(circle at 90% 10%,rgba(29,155,240,.08),transparent 24%),
    var(--bg);
  overflow-x:hidden;
}

input,
textarea,
button{
  font-family:inherit;
  font-size:inherit;
}

#root{
  width:100%;
  max-width:520px;
  margin:0 auto;
  padding:0 16px 88px;
  overflow-x:hidden;
}

/* Cards */
.card{
  width:100%;
  max-width:100%;
  overflow:hidden;
  background:linear-gradient(180deg,var(--card),#10141b);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset;
}

.card:has(.input:focus),
.card:has(.textarea:focus){
  border-color:rgba(255,122,47,.42);
  box-shadow:var(--shadowSoft);
}

/* Inputs */
.input,
.textarea{
  display:block;
  width:100%;
  max-width:100%;
  min-width:0;
  background:var(--field);
  border:1px solid var(--border2);
  border-radius:16px;
  color:var(--ink);
  outline:none;
  transition:border-color .15s,background .15s,box-shadow .15s;
  -webkit-appearance:none;
  appearance:none;
  box-shadow:0 1px 0 rgba(255,255,255,.025) inset;
}

.input{
  min-height:52px;
  padding:13px 15px;
  font-size:16px;
  line-height:1.35;
}

.textarea{
  padding:13px 15px;
  font-size:15px;
  line-height:1.45;
  resize:vertical;
  min-height:76px;
}

.input:focus,
.textarea:focus{
  background:var(--field2);
  border-color:var(--borderFocus);
  box-shadow:0 0 0 4px rgba(255,122,47,.10);
}

.input::placeholder,
.textarea::placeholder{
  color:var(--muted);
}

/* Critical mobile overflow fix for date input */
input[type="date"]{
  display:block;
  width:100%;
  max-width:100%;
  min-width:0;
  min-height:52px;
  line-height:normal;
  overflow:hidden;
  color-scheme:dark;
  position:relative;
}

input[type="date"]::-webkit-date-and-time-value{
  text-align:left;
  max-width:100%;
}

input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(1);
  opacity:.7;
  padding:4px;
  margin-left:4px;
}

/* Buttons */
.btn{
  display:block;
  width:100%;
  max-width:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  border:none;
  border-radius:9999px;
  padding:15px 20px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:transform .12s,opacity .12s,filter .12s;
  box-shadow:0 12px 28px rgba(255,122,47,.24);
}

.btn:active{
  transform:scale(.985);
  opacity:.9;
}

.btn:disabled{
  opacity:.35;
  cursor:default;
  box-shadow:none;
}

.btn-done{
  background:linear-gradient(135deg,var(--green),#12d89a);
  box-shadow:0 12px 28px rgba(0,199,129,.22);
}

.btn-sec{
  display:inline-block;
  max-width:100%;
  background:rgba(255,255,255,.03);
  color:var(--accent2);
  border:1px solid var(--border2);
  border-radius:9999px;
  padding:10px 18px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:background .12s,border-color .12s,transform .12s;
}

.btn-sec:active{
  background:rgba(255,255,255,.07);
  transform:scale(.985);
}

/* Labels & text */
.label{
  display:block;
  font-size:13px;
  font-weight:800;
  color:var(--muted);
  margin-bottom:7px;
  letter-spacing:.075em;
  text-transform:uppercase;
}

.hint{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
  line-height:1.55;
}

.tag{
  display:inline-flex;
  align-items:center;
  width:max-content;
  max-width:100%;
  font-size:12px;
  font-weight:900;
  color:var(--accent2);
  letter-spacing:.17em;
  text-transform:uppercase;
  background:var(--accentSoft);
  border:1px solid rgba(255,122,47,.16);
  border-radius:9999px;
  padding:7px 13px;
}

.h1{
  font-size:25px;
  font-weight:900;
  letter-spacing:-.045em;
  line-height:1.12;
  color:var(--ink);
}

.h3{
  font-size:15px;
  font-weight:800;
  color:var(--ink);
}

.pill{
  font-size:11px;
  font-weight:900;
  letter-spacing:.06em;
  padding:4px 10px;
  border-radius:9999px;
  display:inline-block;
  text-transform:uppercase;
}

/* Layout */
.row{
  display:flex;
  gap:8px;
  align-items:center;
  min-width:0;
}

.spacer{
  height:16px;
}

.divider{
  height:1px;
  background:var(--border);
  margin:22px 0;
}

.field{
  width:100%;
  max-width:100%;
  min-width:0;
  margin-bottom:17px;
}

/* Fix side-by-side inputs from overflowing on small screens */
.field[style*="display:flex"],
div[style*="display: flex"]{
  min-width:0;
}

.field > div{
  min-width:0;
}

/* Nav */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(5,5,7,.88);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:flex;
  z-index:100;
  padding:0 0 env(safe-area-inset-bottom);
}

.nav button{
  flex:1;
  min-width:0;
  padding:10px 0 8px;
  background:transparent;
  border:none;
  color:var(--dim);
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  text-align:center;
}

.nav button.active{
  color:var(--accent2);
}

.nav-icon{
  font-size:20px;
  display:block;
  line-height:1;
  margin-bottom:2px;
}

/* Progress */
.prog-track{
  background:var(--card2);
  height:5px;
  border-radius:999px;
  overflow:hidden;
}

.prog-fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .3s;
}

.prog-fill-green{
  background:linear-gradient(90deg,var(--green),#12d89a);
}

/* Stats */
.stat-box{
  flex:1;
  min-width:0;
  text-align:center;
  padding:15px 6px;
}

.stat-val{
  font-size:23px;
  font-weight:900;
  letter-spacing:-.03em;
}

.stat-label{
  font-size:10px;
  color:var(--muted);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-top:3px;
}

/* Checkbox */
input[type="checkbox"]{
  width:20px;
  height:20px;
  accent-color:var(--accent);
  cursor:pointer;
}

/* Action items */
.action-item{
  padding:14px 0;
}

.action-item+.action-item{
  border-top:1px solid var(--border);
}

.action-checks{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  padding-left:28px;
  margin-top:9px;
}

.action-checks label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  color:var(--muted);
  cursor:pointer;
  user-select:none;
}

.action-done{
  opacity:.48;
  text-decoration:line-through;
}

/* Dot */
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  display:inline-block;
  margin-right:10px;
  flex-shrink:0;
  box-shadow:0 0 18px rgba(255,122,47,.38);
}

/* Prevent any child from pushing outside the phone viewport */
.card *,
#root *{
  max-width:100%;
}

svg{
  max-width:100%;
}

/* Mobile polish */
@media(max-width:430px){
  #root{
    padding-left:14px;
    padding-right:14px;
  }

  .card{
    border-radius:21px;
    padding:17px;
  }

  .input{
    font-size:16px;
    padding-left:14px;
    padding-right:14px;
  }

  .textarea{
    font-size:15px;
  }
}

@media(max-width:380px){
  #root{
    padding-left:12px;
    padding-right:12px;
  }

  .h1{
    font-size:22px;
  }

  .stat-val{
    font-size:19px;
  }

  .card{
    padding:15px;
    border-radius:19px;
  }

  .input{
    min-height:50px;
  }
}
</style>
